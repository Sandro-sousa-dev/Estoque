<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Gestão de Estoque</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: '#2563eb',
            entrada: '#10b981',
            saida: '#f43f5e'
          }
        }
      }
    }
  </script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Firebase SDK Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .main-h { height: calc(100vh - 64px); }
    @media print { .hide-print { display: none !important; } .print-area { width: 100% !important; margin: 0 !important; } }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyCOCOKhVcGFvsQrea7yKDbjV-L7XH8Xg4s",
      authDomain: "estoquealum-c8475.firebaseapp.com",
      projectId: "estoquealum-c8475",
      storageBucket: "estoquealum-c8475.firebasestorage.app",
      messagingSenderId: "314790404484",
      appId: "1:314790404484:web:fa97aadd504ed6f162bdd1"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const APP_ID = 'alumar-sistema-oficial';

    // Instância secundária para o Admin criar contas sem deslogar
    const secondaryAppName = "UserManagerApp";
    let secondaryApp = firebase.apps.find(app => app.name === secondaryAppName);
    if (!secondaryApp) secondaryApp = firebase.initializeApp(firebaseConfig, secondaryAppName);
    const secondaryAuth = secondaryApp.auth();

    // Ícones SVG Reutilizáveis
    const Icons = {
      Box: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>,
      History: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
      Users: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
      Admin: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
      Eye: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>,
      EyeOff: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.976 9.976 0 012.146-3.525m7.83-1.464A9.958 9.958 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.017 10.017 0 01-4.286 5.585M9.88 9.88l4.24 4.24M10.73 5.08l1.41 1.41M18.36 18.36l1.41 1.41M3.64 3.64l1.41 1.41" /></svg>,
      Inventory: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
    };

    function App() {
      const [user, setUser] = useState(null);
      const [userProfile, setUserProfile] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [dbLoading, setDbLoading] = useState(true);

      const [activeTab, setActiveTab] = useState('dashboard');
      const [menuOpen, setMenuOpen] = useState(false);
      const [notificacao, setNotificacao] = useState(null);
      const [darkMode, setDarkMode] = useState(() => JSON.parse(localStorage.getItem('alumar_darkMode')) || false);
      const [modalConfirm, setModalConfirm] = useState({ show: false, col: '', id: '', msg: '' });

      const [produtos, setProdutos] = useState([]);
      const [funcionarios, setFuncionarios] = useState([]);
      const [empresas, setEmpresas] = useState([]);
      const [movimentacoes, setMovimentacoes] = useState([]);
      const [usuarios, setUsuarios] = useState([]);
      const [configAdmin, setConfigAdmin] = useState({ emailAlertas: '' });

      // Sincronização de Autenticação
      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (u) => {
          if (!u) { setUser(null); setUserProfile(null); setAuthLoading(false); return; }
          setUser(u);
          db.collection(`artifacts/${APP_ID}/public/data/usuarios`).doc(u.email).onSnapshot(async (doc) => {
            if (doc.exists) {
              setUserProfile(doc.data());
            } else {
              const snap = await db.collection(`artifacts/${APP_ID}/public/data/usuarios`).limit(1).get();
              const isAdmin = snap.empty;
              const newProfile = { email: u.email, role: isAdmin ? 'admin' : 'user', ativo: isAdmin, criadoEm: new Date().toISOString() };
              await db.collection(`artifacts/${APP_ID}/public/data/usuarios`).doc(u.email).set(newProfile);
              setUserProfile(newProfile);
            }
            setAuthLoading(false);
          });
        });
        return () => unsubscribe();
      }, []);

      // Sincronização de Dados
      useEffect(() => {
        if (!userProfile?.ativo) return;
        setDbLoading(true);
        const path = (col) => db.collection(`artifacts/${APP_ID}/public/data/${col}`);

        const unsubP = path('produtos').onSnapshot(s => setProdutos(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const unsubF = path('funcionarios').onSnapshot(s => setFuncionarios(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const unsubE = path('empresas').onSnapshot(s => setEmpresas(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const unsubU = path('usuarios').onSnapshot(s => setUsuarios(s.docs.map(d => ({id: d.id, ...d.data()}))));
        const unsubC = path('config').doc('admin').onSnapshot(d => d.exists && setConfigAdmin(d.data()));
        const unsubM = path('movimentacoes').onSnapshot(s => {
          const m = s.docs.map(d => ({id: d.id, ...d.data()}));
          m.sort((a,b) => b.id.localeCompare(a.id));
          setMovimentacoes(m);
          setDbLoading(false);
        });

        return () => { unsubP(); unsubF(); unsubE(); unsubM(); unsubU(); unsubC(); };
      }, [userProfile]);

      useEffect(() => {
        localStorage.setItem('alumar_darkMode', JSON.stringify(darkMode));
        darkMode ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark');
      }, [darkMode]);

      const notify = (msg, tipo = 'success') => {
        setNotificacao({ msg, tipo });
        setTimeout(() => setNotificacao(null), 3000);
      };

      const handleConfirmDelete = async () => {
        try {
          await db.collection(`artifacts/${APP_ID}/public/data/${modalConfirm.col}`).doc(modalConfirm.id).delete();
          notify('Registo removido!');
        } catch (e) { notify('Erro ao remover.', 'error'); }
        setModalConfirm({ show: false, col: '', id: '', msg: '' });
      };

      // --- NOVA TELA DE ESTOQUE ---
      const TabEstoque = () => {
        const [searchTerm, setSearchTerm] = useState('');
        const [filterLowStock, setFilterLowStock] = useState(false);
        const [sortBy, setSortBy] = useState('nome'); // 'nome', 'quantidade', 'codigo'

        // Produtos filtrados e ordenados
        const filteredProducts = useMemo(() => {
          let filtered = [...produtos];

          // Filtro por termo de busca
          if (searchTerm) {
            const term = searchTerm.toLowerCase();
            filtered = filtered.filter(p => 
              p.nome?.toLowerCase().includes(term) ||
              p.codigo?.toLowerCase().includes(term) ||
              p.id?.toLowerCase().includes(term)
            );
          }

          // Filtro de estoque baixo
          if (filterLowStock) {
            filtered = filtered.filter(p => p.quantidadeAtual <= p.estoqueMinimo);
          }

          // Ordenação
          filtered.sort((a, b) => {
            if (sortBy === 'nome') return a.nome?.localeCompare(b.nome);
            if (sortBy === 'codigo') return a.codigo?.localeCompare(b.codigo);
            if (sortBy === 'quantidade') return b.quantidadeAtual - a.quantidadeAtual;
            return 0;
          });

          return filtered;
        }, [produtos, searchTerm, filterLowStock, sortBy]);

        // Estatísticas do estoque
        const stats = useMemo(() => {
          const totalItems = produtos.length;
          const totalQuantity = produtos.reduce((acc, p) => acc + (p.quantidadeAtual || 0), 0);
          const lowStockItems = produtos.filter(p => p.quantidadeAtual <= p.estoqueMinimo).length;
          const outOfStock = produtos.filter(p => p.quantidadeAtual === 0).length;
          
          return { totalItems, totalQuantity, lowStockItems, outOfStock };
        }, [produtos]);

        return (
          <div className="max-w-7xl mx-auto animate-fade-in">
            {/* Cabeçalho */}
            <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
              <div>
                <h2 className="text-4xl font-black text-slate-800 dark:text-white">Estoque</h2>
                <p className="text-slate-500 font-medium">Visão completa de todos os materiais</p>
              </div>
              <button 
                onClick={() => window.print()} 
                className="bg-white dark:bg-slate-800 p-3 rounded-2xl border dark:border-slate-700 shadow-sm hide-print"
              >
                <i className="fa-solid fa-print"></i>
              </button>
            </header>

            {/* Cards de Estatísticas */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
              <div className="bg-white dark:bg-slate-900 p-6 rounded-2xl border dark:border-slate-800 shadow-sm">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-slate-400 text-sm font-medium">Total de Itens</span>
                  <div className="w-10 h-10 bg-brand/10 rounded-xl flex items-center justify-center text-brand">
                    <i className="fa-solid fa-cubes"></i>
                  </div>
                </div>
                <p className="text-3xl font-black dark:text-white">{stats.totalItems}</p>
                <p className="text-xs text-slate-400 mt-1">Tipos diferentes de materiais</p>
              </div>

              <div className="bg-white dark:bg-slate-900 p-6 rounded-2xl border dark:border-slate-800 shadow-sm">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-slate-400 text-sm font-medium">Quantidade Total</span>
                  <div className="w-10 h-10 bg-emerald-500/10 rounded-xl flex items-center justify-center text-emerald-500">
                    <i className="fa-solid fa-weight-hanging"></i>
                  </div>
                </div>
                <p className="text-3xl font-black dark:text-white">{stats.totalQuantity}</p>
                <p className="text-xs text-slate-400 mt-1">Unidades em estoque</p>
              </div>

              <div className="bg-white dark:bg-slate-900 p-6 rounded-2xl border dark:border-slate-800 shadow-sm">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-slate-400 text-sm font-medium">Estoque Baixo</span>
                  <div className="w-10 h-10 bg-amber-500/10 rounded-xl flex items-center justify-center text-amber-500">
                    <i className="fa-solid fa-exclamation-triangle"></i>
                  </div>
                </div>
                <p className="text-3xl font-black dark:text-white">{stats.lowStockItems}</p>
                <p className="text-xs text-slate-400 mt-1">Abaixo do mínimo</p>
              </div>

              <div className="bg-white dark:bg-slate-900 p-6 rounded-2xl border dark:border-slate-800 shadow-sm">
                <div className="flex items-center justify-between mb-2">
                  <span className="text-slate-400 text-sm font-medium">Em Falta</span>
                  <div className="w-10 h-10 bg-rose-500/10 rounded-xl flex items-center justify-center text-rose-500">
                    <i className="fa-solid fa-circle-exclamation"></i>
                  </div>
                </div>
                <p className="text-3xl font-black dark:text-white">{stats.outOfStock}</p>
                <p className="text-xs text-slate-400 mt-1">Sem unidades</p>
              </div>
            </div>

            {/* Barra de Filtros */}
            <div className="bg-white dark:bg-slate-900 p-6 rounded-3xl border dark:border-slate-800 shadow-sm mb-8 hide-print">
              <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                {/* Busca */}
                <div className="relative md:col-span-2">
                  <input
                    type="text"
                    placeholder="Buscar por nome, código ou ID..."
                    className="w-full bg-slate-50 dark:bg-slate-950 p-4 pl-12 rounded-2xl outline-none dark:text-white"
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}
                  />
                  <i className="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  {searchTerm && (
                    <button
                      onClick={() => setSearchTerm('')}
                      className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-rose-500"
                    >
                      <i className="fa-solid fa-xmark"></i>
                    </button>
                  )}
                </div>

                {/* Filtro de estoque baixo */}
                <button
                  onClick={() => setFilterLowStock(!filterLowStock)}
                  className={`p-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 ${
                    filterLowStock 
                      ? 'bg-amber-500 text-white shadow-lg' 
                      : 'bg-slate-50 dark:bg-slate-950 text-slate-400'
                  }`}
                >
                  <i className="fa-solid fa-exclamation-triangle"></i>
                  Apenas Estoque Baixo
                </button>

                {/* Ordenação */}
                <select
                  value={sortBy}
                  onChange={(e) => setSortBy(e.target.value)}
                  className="bg-slate-50 dark:bg-slate-950 p-4 rounded-2xl outline-none dark:text-white font-bold"
                >
                  <option value="nome">Ordenar por Nome</option>
                  <option value="codigo">Ordenar por Código</option>
                  <option value="quantidade">Ordenar por Quantidade</option>
                </select>
              </div>
            </div>

            {/* Tabela de Estoque */}
            <div className="bg-white dark:bg-slate-900 rounded-3xl border dark:border-slate-800 shadow-sm overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full">
                  <thead className="bg-slate-50 dark:bg-slate-950 border-b dark:border-slate-800">
                    <tr>
                      <th className="px-6 py-4 text-left text-xs font-black uppercase tracking-wider text-slate-400">Status</th>
                      <th className="px-6 py-4 text-left text-xs font-black uppercase tracking-wider text-slate-400">Código</th>
                      <th className="px-6 py-4 text-left text-xs font-black uppercase tracking-wider text-slate-400">Material</th>
                      <th className="px-6 py-4 text-left text-xs font-black uppercase tracking-wider text-slate-400">Unidade</th>
                      <th className="px-6 py-4 text-left text-xs font-black uppercase tracking-wider text-slate-400">Mínimo</th>
                      <th className="px-6 py-4 text-left text-xs font-black uppercase tracking-wider text-slate-400">Atual</th>
                      <th className="px-6 py-4 text-left text-xs font-black uppercase tracking-wider text-slate-400">%</th>
                      <th className="px-6 py-4 text-left text-xs font-black uppercase tracking-wider text-slate-400">Status</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y dark:divide-slate-800">
                    {filteredProducts.length === 0 ? (
                      <tr>
                        <td colSpan="8" className="px-6 py-12 text-center text-slate-400">
                          <i className="fa-solid fa-box-open text-4xl mb-3"></i>
                          <p>Nenhum material encontrado</p>
                        </td>
                      </tr>
                    ) : (
                      filteredProducts.map(prod => {
                        const percent = Math.min((prod.quantidadeAtual / (prod.estoqueMinimo * 2 || 10)) * 100, 100);
                        const status = prod.quantidadeAtual <= prod.estoqueMinimo ? 'Baixo' : 'Normal';
                        const statusColor = prod.quantidadeAtual <= prod.estoqueMinimo 
                          ? (prod.quantidadeAtual === 0 ? 'text-rose-600' : 'text-amber-600')
                          : 'text-emerald-600';
                        
                        return (
                          <tr key={prod.id} className="hover:bg-slate-50 dark:hover:bg-slate-950/50 transition-colors">
                            <td className="px-6 py-4">
                              <div className={`w-3 h-3 rounded-full ${
                                prod.quantidadeAtual <= prod.estoqueMinimo 
                                  ? (prod.quantidadeAtual === 0 ? 'bg-rose-500' : 'bg-amber-500')
                                  : 'bg-emerald-500'
                              }`}></div>
                            </td>
                            <td className="px-6 py-4 font-mono text-sm dark:text-white">{prod.codigo || prod.id}</td>
                            <td className="px-6 py-4 font-bold dark:text-white">{prod.nome}</td>
                            <td className="px-6 py-4 text-slate-400">{prod.unidade || 'un'}</td>
                            <td className="px-6 py-4 dark:text-white">{prod.estoqueMinimo}</td>
                            <td className="px-6 py-4">
                              <span className={`text-lg font-black ${
                                prod.quantidadeAtual <= prod.estoqueMinimo 
                                  ? (prod.quantidadeAtual === 0 ? 'text-rose-600' : 'text-amber-600')
                                  : 'text-emerald-600'
                              }`}>
                                {prod.quantidadeAtual}
                              </span>
                            </td>
                            <td className="px-6 py-4">
                              <div className="w-20 bg-slate-100 dark:bg-slate-800 h-2 rounded-full overflow-hidden">
                                <div 
                                  className={`h-full ${
                                    prod.quantidadeAtual <= prod.estoqueMinimo 
                                      ? (prod.quantidadeAtual === 0 ? 'bg-rose-500' : 'bg-amber-500')
                                      : 'bg-emerald-500'
                                  }`}
                                  style={{ width: `${percent}%` }}
                                ></div>
                              </div>
                            </td>
                            <td className="px-6 py-4">
                              <span className={`text-xs font-black uppercase ${statusColor}`}>
                                {status}
                              </span>
                            </td>
                          </tr>
                        );
                      })
                    )}
                  </tbody>
                </table>
              </div>
              
              {/* Rodapé da tabela com contagem */}
              <div className="px-6 py-4 bg-slate-50 dark:bg-slate-950 border-t dark:border-slate-800 text-sm text-slate-400">
                Mostrando {filteredProducts.length} de {produtos.length} materiais
              </div>
            </div>

            {/* Cards em grid para visualização alternativa (mobile-friendly) */}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-8 md:hidden">
              {filteredProducts.map(prod => {
                const percent = Math.min((prod.quantidadeAtual / (prod.estoqueMinimo * 2 || 10)) * 100, 100);
                const isLow = prod.quantidadeAtual <= prod.estoqueMinimo;
                
                return (
                  <div key={prod.id} className="bg-white dark:bg-slate-900 p-5 rounded-3xl border dark:border-slate-800 shadow-sm">
                    <div className="flex justify-between items-start mb-3">
                      <div>
                        <h3 className="font-bold dark:text-white">{prod.nome}</h3>
                        <p className="text-[10px] font-mono text-slate-400">{prod.codigo || prod.id}</p>
                      </div>
                      <span className={`text-[10px] font-black uppercase px-2 py-0.5 rounded ${
                        isLow 
                          ? (prod.quantidadeAtual === 0 ? 'bg-rose-100 text-rose-600' : 'bg-amber-100 text-amber-600')
                          : 'bg-emerald-100 text-emerald-600'
                      }`}>
                        {prod.quantidadeAtual <= prod.estoqueMinimo ? 'Baixo' : 'OK'}
                      </span>
                    </div>
                    
                    <div className="flex justify-between items-center mb-2">
                      <span className="text-2xl font-black dark:text-white">{prod.quantidadeAtual}</span>
                      <span className="text-xs text-slate-400">{prod.unidade || 'un'}</span>
                    </div>
                    
                    <div className="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full overflow-hidden mb-2">
                      <div 
                        className={`h-full ${isLow ? 'bg-amber-500' : 'bg-emerald-500'}`}
                        style={{ width: `${percent}%` }}
                      ></div>
                    </div>
                    
                    <div className="flex justify-between text-xs text-slate-400">
                      <span>Mínimo: {prod.estoqueMinimo}</span>
                      <span>{percent.toFixed(0)}%</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      // --- TELAS EXISTENTES ---

      const AuthScreen = () => {
        const [showPass, setShowPass] = useState(false);
        const [mode, setMode] = useState('login');
        const [email, setEmail] = useState('');
        const [pass, setPass] = useState('');
        const [l, setL] = useState(false);

        const handleAuth = async (e) => {
          e.preventDefault();
          setL(true);
          try {
            if (mode === 'login') await auth.signInWithEmailAndPassword(email, pass);
            else await auth.createUserWithEmailAndPassword(email, pass);
          } catch (err) { notify('Erro: Verifique os seus dados.', 'error'); }
          setL(false);
        };

        return (
          <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50 dark:bg-slate-950">
            <div className="max-w-md w-full bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl p-8 sm:p-12 border dark:border-slate-800 animate-fade-in">
              <div className="flex justify-center mb-8">
                <div className="w-16 h-16 bg-brand text-white flex items-center justify-center rounded-2xl shadow-xl shadow-brand/20">
                  <Icons.Box />
                </div>
              </div>
              <h1 className="text-3xl font-black text-center text-slate-800 dark:text-white mb-2">ESTOQUE</h1>
              <p className="text-center text-slate-400 mb-8 text-sm font-bold uppercase tracking-widest">Painel Profissional</p>
              
              <form onSubmit={handleAuth} className="space-y-4">
                <div className="space-y-1">
                  <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Utilizador</label>
                  <input type="email" required className="w-full bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-brand/20 dark:text-white" value={email} onChange={e => setEmail(e.target.value)} />
                </div>
                <div className="space-y-1">
                  <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Senha</label>
                  <div className="relative">
                    <input type={showPass ? "text" : "password"} required className="w-full bg-slate-50 dark:bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-brand/20 dark:text-white pr-12" value={pass} onChange={e => setPass(e.target.value)} />
                    <button type="button" onClick={() => setShowPass(!showPass)} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                      {showPass ? <Icons.EyeOff /> : <Icons.Eye />}
                    </button>
                  </div>
                </div>
                <button type="submit" disabled={l} className="w-full bg-brand hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl transition-all flex items-center justify-center gap-2">
                  {l ? <i className="fa-solid fa-spinner fa-spin"></i> : (mode === 'login' ? 'Entrar' : 'Solicitar Acesso')}
                </button>
              </form>
              <button onClick={() => setMode(mode === 'login' ? 'reg' : 'login')} className="w-full text-center mt-6 text-xs font-bold text-brand hover:underline">
                {mode === 'login' ? 'Novo por aqui? Criar conta' : 'Já tem conta? Login'}
              </button>
            </div>
          </div>
        );
      };

      const TabDashboard = () => {
        const baixos = produtos.filter(p => p.quantidadeAtual <= p.estoqueMinimo);
        
        const sendEmail = () => {
          if (!configAdmin.emailAlertas) return (notify('Configure o e-mail na aba Administração!', 'error'), setActiveTab('admin'));
          let body = "RELATÓRIO DE ALERTAS DE ESTOQUE\n\n";
          body += baixos.map(p => `- ${p.nome}: ${p.quantidadeAtual} ${p.unidade} (Mín: ${p.estoqueMinimo})`).join('\n');
          window.location.href = `mailto:${configAdmin.emailAlertas}?subject=ALERTAS%20DE%20ESTOQUE&body=${encodeURIComponent(body)}`;
        };

        return (
          <div className="max-w-6xl mx-auto animate-fade-in print-area">
            <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10 gap-4">
              <div>
                <h2 className="text-4xl font-black text-slate-800 dark:text-white">Dashboard</h2>
                <p className="text-slate-500 font-medium">Controlo visual do inventário.</p>
              </div>
              <div className="flex gap-2">
                {baixos.length > 0 && (
                  <button onClick={sendEmail} className="bg-rose-500 text-white px-5 py-3 rounded-2xl font-bold flex items-center gap-2 shadow-lg animate-pulse">
                    <i className="fa-solid fa-envelope"></i> Alerta E-mail
                  </button>
                )}
                <button onClick={() => window.print()} className="bg-white dark:bg-slate-800 p-3 rounded-2xl border dark:border-slate-700 shadow-sm hide-print">
                  <i className="fa-solid fa-print"></i>
                </button>
              </div>
            </header>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {produtos.map(p => {
                const critico = p.quantidadeAtual <= p.estoqueMinimo;
                const percent = Math.min((p.quantidadeAtual / (p.estoqueMinimo * 2 || 10)) * 100, 100);
                return (
                  <div key={p.id} className="bg-white dark:bg-slate-800 p-6 rounded-[2rem] border dark:border-slate-700 shadow-sm transition-all hover:shadow-lg">
                    <div className="flex justify-between items-center mb-4">
                      <div className="w-10 h-10 bg-brand/10 text-brand rounded-xl flex items-center justify-center"><Icons.Box /></div>
                      <span className={`text-[10px] font-black uppercase px-2 py-0.5 rounded ${critico ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}`}>
                        {critico ? 'Baixo' : 'OK'}
                      </span>
                    </div>
                    <h3 className="font-bold text-slate-800 dark:text-white text-lg mb-1">{p.nome}</h3>
                    <p className="text-xs text-slate-400 mb-6">Cód: {p.codigo}</p>
                    <div className="flex justify-between items-end mb-2">
                      <span className="text-3xl font-black dark:text-white">{p.quantidadeAtual}</span>
                      <span className="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest">{p.unidade}</span>
                    </div>
                    <div className="w-full bg-slate-100 dark:bg-slate-900 h-3 rounded-full overflow-hidden">
                      <div className={`h-full transition-all duration-700 ${critico ? 'bg-rose-500' : 'bg-brand'}`} style={{ width: `${percent}%` }}></div>
                    </div>
                  </div>
                )
              })}
            </div>
          </div>
        );
      };

      const TabHistorico = () => {
        const [search, setSearch] = useState('');
        
        // Filtro aprimorado: busca por nome do produto, código, ID da movimentação ou funcionário
        const filtered = useMemo(() => {
          if (!search.trim()) return movimentacoes;
          const term = search.toLowerCase();
          
          return movimentacoes.filter(m => {
            const prod = produtos.find(p => p.id === m.produtoId);
            const func = funcionarios.find(f => f.id === m.funcionarioId);
            
            return (
              prod?.nome?.toLowerCase().includes(term) ||
              prod?.codigo?.toLowerCase().includes(term) ||
              prod?.id?.toLowerCase().includes(term) ||
              m.id?.toLowerCase().includes(term) ||
              func?.nome?.toLowerCase().includes(term) ||
              func?.id?.toLowerCase().includes(term) ||
              m.funcionarioId?.toLowerCase().includes(term)
            );
          });
        }, [search, movimentacoes, produtos, funcionarios]);

        return (
          <div className="max-w-5xl mx-auto animate-fade-in">
            <h2 className="text-3xl font-black text-slate-800 dark:text-white mb-8">Histórico</h2>
            
            {/* Barra de busca aprimorada */}
            <div className="relative max-w-2xl mb-8">
              <input 
                type="text" 
                placeholder="Buscar por: nome do item, código, ID do produto, ID da movimentação ou funcionário..." 
                className="w-full bg-white dark:bg-slate-800 p-4 pl-12 rounded-2xl outline-none border dark:border-slate-700 dark:text-white shadow-sm"
                value={search} 
                onChange={e => setSearch(e.target.value)}
              />
              <i className="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
              {search && (
                <button 
                  onClick={() => setSearch('')}
                  className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-rose-500 transition-colors"
                >
                  <i className="fa-solid fa-xmark"></i>
                </button>
              )}
            </div>
            
            {/* Contador de resultados */}
            {search && (
              <p className="text-sm text-slate-400 mb-4">
                {filtered.length} resultado(s) encontrado(s) para "{search}"
              </p>
            )}
            
            <div className="space-y-4">
              {filtered.length === 0 ? (
                <div className="text-center py-12 text-slate-400">
                  <i className="fa-solid fa-inbox text-4xl mb-3"></i>
                  <p>Nenhuma movimentação encontrada</p>
                </div>
              ) : (
                filtered.map(m => {
                  const prod = produtos.find(p => p.id === m.produtoId);
                  const func = funcionarios.find(f => f.id === m.funcionarioId);
                  const emp = empresas.find(e => e.id === m.empresaId);
                  const isOut = m.tipo === 'saida';
                  return (
                    <div key={m.id} className={`p-6 rounded-[2rem] border shadow-sm flex flex-col md:flex-row md:items-center gap-5 transition-all ${isOut ? 'bg-rose-50/30 border-rose-100 dark:bg-rose-950/20' : 'bg-emerald-50/30 border-emerald-100 dark:bg-emerald-950/20'}`}>
                      <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-xl shrink-0 ${isOut ? 'bg-rose-500 text-white' : 'bg-emerald-500 text-white'}`}>
                        {isOut ? <i className="fa-solid fa-arrow-up"></i> : <i className="fa-solid fa-arrow-down"></i>}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-1 flex-wrap">
                          <h4 className="font-bold text-slate-800 dark:text-white text-lg">{prod?.nome || 'Item excluído'}</h4>
                          <span className={`text-[10px] font-black uppercase px-2 py-0.5 rounded text-white ${isOut ? 'bg-rose-500' : 'bg-emerald-500'}`}>
                            {isOut ? 'Retirada' : 'Carga'}
                          </span>
                          {prod?.codigo && (
                            <span className="text-[10px] font-mono text-slate-400 bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded">
                              {prod.codigo}
                            </span>
                          )}
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-1 text-xs text-slate-500 font-medium">
                          <span><i className="fa-solid fa-user mr-2"></i>{func?.nome || 'ID: '+m.funcionarioId}</span>
                          <span><i className="fa-solid fa-building mr-2"></i>{emp?.nome || 'Local'}</span>
                          <span><i className="fa-solid fa-hashtag mr-2"></i>Mov: {m.id}</span>
                          <span className="sm:col-span-2"><i className="fa-solid fa-calendar mr-2"></i>{m.data}</span>
                        </div>
                        {m.observacoes && <p className="mt-3 text-sm italic text-slate-500 bg-white/50 dark:bg-black/20 p-3 rounded-xl border dark:border-slate-800">Obs: {m.observacoes}</p>}
                      </div>
                      <div className={`text-3xl font-black ${isOut ? 'text-rose-600' : 'text-emerald-600'}`}>
                        {isOut ? '-' : '+'}{m.quantidade}
                      </div>
                    </div>
                  )
                })
              )}
            </div>
          </div>
        )
      };

      const TabAdministracao = () => {
        const [emailAlerta, setEmailAlerta] = useState(configAdmin.emailAlertas || '');
        const [showAdd, setShowAdd] = useState(false);
        const [addMail, setAddMail] = useState('');
        const [addPass, setAddPass] = useState('');

        const handleAddUser = async (e) => {
          e.preventDefault();
          if (!addMail || addPass.length < 6) return notify('E-mail válido e senha min 6 chars', 'error');
          try {
            await secondaryAuth.createUserWithEmailAndPassword(addMail, addPass);
            await db.collection(`artifacts/${APP_ID}/public/data/usuarios`).doc(addMail).set({
              email: addMail, role: 'user', ativo: true, criadoEm: new Date().toISOString()
            });
            notify('Utilizador cadastrado!');
            setAddMail(''); setAddPass(''); setShowAdd(false);
            secondaryAuth.signOut();
          } catch (err) { notify('Erro: E-mail já existe ou inválido.', 'error'); }
        };

        const toggleUser = async (u) => {
          if (u.email === user.email) return;
          await db.collection(`artifacts/${APP_ID}/public/data/usuarios`).doc(u.email).update({ ativo: !u.ativo });
          notify('Acesso alterado');
        };

        const removeUser = async (userEmail) => {
          if (userEmail === user.email) {
            return notify('Você não pode remover sua própria conta!', 'error');
          }
          if (!window.confirm(`Tem certeza que deseja remover permanentemente o usuário ${userEmail}? Esta ação não pode ser desfeita.`)) {
            return;
          }
          try {
            await db.collection(`artifacts/${APP_ID}/public/data/usuarios`).doc(userEmail).delete();
            notify('Usuário removido com sucesso!');
          } catch (err) {
            console.error(err);
            notify('Erro ao remover usuário. Verifique as permissões.', 'error');
          }
        };

        return (
          <div className="max-w-5xl mx-auto animate-fade-in space-y-10">
            <header className="flex justify-between items-center">
              <h2 className="text-3xl font-black dark:text-white">Administração</h2>
              <button onClick={() => setShowAdd(!showAdd)} className="bg-brand text-white px-6 py-3 rounded-2xl font-bold shadow-lg transition-transform active:scale-95">
                + Adicionar Membro
              </button>
            </header>

            {showAdd && (
              <div className="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border dark:border-slate-800 shadow-xl animate-fade-in">
                <h3 className="font-bold dark:text-white mb-6">Novo Utilizador do Sistema</h3>
                <form onSubmit={handleAddUser} className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 items-end">
                  <input type="email" placeholder="E-mail" className="p-4 rounded-2xl bg-slate-50 dark:bg-slate-950 dark:text-white outline-none" value={addMail} onChange={e => setAddMail(e.target.value)} />
                  <input type="password" placeholder="Senha provisória" className="p-4 rounded-2xl bg-slate-50 dark:bg-slate-950 dark:text-white outline-none" value={addPass} onChange={e => setAddPass(e.target.value)} />
                  <button type="submit" className="bg-slate-800 dark:bg-white text-white dark:text-slate-900 font-bold py-4 rounded-2xl">Criar Conta</button>
                </form>
              </div>
            )}

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              <div className="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border dark:border-slate-800">
                <h3 className="font-bold dark:text-white mb-6">Alertas</h3>
                <input type="email" placeholder="E-mail do Gestor" className="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-950 dark:text-white mb-4 outline-none" value={emailAlerta} onChange={e => setEmailAlerta(e.target.value)} />
                <button onClick={() => db.collection(`artifacts/${APP_ID}/public/data/config`).doc('admin').set({emailAlertas: emailAlerta}).then(() => notify('Configuração salva!'))} className="w-full bg-brand text-white py-4 rounded-2xl font-bold">Salvar E-mail</button>
              </div>

              <div className="lg:col-span-2 bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border dark:border-slate-800">
                <h3 className="font-bold dark:text-white mb-6">Membros Cadastrados</h3>
                <div className="space-y-4">
                  {usuarios.length === 0 ? (
                    <p className="text-slate-400 text-center py-4">Nenhum usuário cadastrado</p>
                  ) : (
                    usuarios.map(u => (
                      <div key={u.id || u.email} className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 p-4 rounded-2xl border dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/30">
                        <div className="flex items-center gap-3 min-w-0">
                          <div className="w-10 h-10 rounded-full bg-brand/10 text-brand flex items-center justify-center font-bold shrink-0">
                            {u.email?.[0].toUpperCase()}
                          </div>
                          <div className="min-w-0">
                            <p className="font-bold dark:text-white truncate">{u.email}</p>
                            <div className="flex items-center gap-2 text-[10px]">
                              <span className={`font-black uppercase ${u.ativo ? 'text-emerald-500' : 'text-rose-500'}`}>
                                {u.ativo ? '● Ativo' : '○ Bloqueado'}
                              </span>
                              <span className="text-slate-400">•</span>
                              <span className="text-slate-400">
                                {u.role === 'admin' ? '👑 Admin' : '👤 Usuário'}
                              </span>
                              {u.criadoEm && (
                                <>
                                  <span className="text-slate-400">•</span>
                                  <span className="text-slate-400">
                                    {new Date(u.criadoEm).toLocaleDateString('pt-PT')}
                                  </span>
                                </>
                              )}
                            </div>
                          </div>
                        </div>
                        
                        <div className="flex gap-2 w-full sm:w-auto">
                          {u.email !== user.email && (
                            <>
                              <button 
                                onClick={() => toggleUser(u)} 
                                className={`px-4 py-2 rounded-xl text-xs font-bold transition-colors ${
                                  u.ativo 
                                    ? 'bg-rose-100 text-rose-600 hover:bg-rose-200' 
                                    : 'bg-emerald-100 text-emerald-600 hover:bg-emerald-200'
                                }`}
                              >
                                {u.ativo ? 'Bloquear' : 'Ativar'}
                              </button>
                              <button 
                                onClick={() => removeUser(u.email)} 
                                className="px-4 py-2 rounded-xl text-xs font-bold bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-rose-100 hover:text-rose-600 dark:hover:bg-rose-900/30 transition-colors"
                                title="Remover permanentemente"
                              >
                                <i className="fa-solid fa-trash-can"></i>
                              </button>
                            </>
                          )}
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          </div>
        )
      };

      // --- MAIN ---
      if (authLoading) return <div className="min-h-screen flex items-center justify-center dark:bg-slate-950"><i className="fa-solid fa-spinner fa-spin text-4xl text-brand"></i></div>;
      if (!user) return <AuthScreen />;
      if (!userProfile?.ativo) return (
        <div className="min-h-screen flex items-center justify-center dark:bg-slate-950 p-6">
          <div className="max-w-sm w-full bg-white dark:bg-slate-900 p-12 rounded-[3rem] shadow-2xl text-center border dark:border-slate-800 animate-fade-in">
            <i className="fa-solid fa-lock text-6xl text-amber-500 mb-6"></i>
            <h2 className="text-2xl font-black dark:text-white mb-2">Pendente</h2>
            <p className="text-slate-400 mb-8 text-sm">O administrador precisa aprovar o seu acesso.</p>
            <button onClick={() => auth.signOut()} className="w-full bg-slate-100 dark:bg-slate-800 dark:text-white font-bold py-4 rounded-2xl">Voltar</button>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen flex flex-col">
          {notificacao && (
            <div className={`fixed top-6 right-6 z-[100] px-6 py-4 rounded-2xl shadow-2xl font-black text-white flex items-center gap-3 animate-fade-in ${notificacao.tipo === 'error' ? 'bg-rose-500' : 'bg-emerald-500'}`}>
              <i className="fa-solid fa-info-circle"></i> {notificacao.msg}
            </div>
          )}

          <header className="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b dark:border-slate-800 flex items-center justify-between px-6 sticky top-0 z-50 hide-print">
            <div className="flex items-center gap-4">
              <button onClick={() => setMenuOpen(!menuOpen)} className="lg:hidden p-2 text-slate-400"><i className="fa-solid fa-bars-staggered text-2xl"></i></button>
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 bg-brand text-white flex items-center justify-center rounded-xl shadow-lg shadow-brand/20"><Icons.Box /></div>
                <h1 className="font-black text-xl text-slate-800 dark:text-white tracking-tighter">ESTOQUE</h1>
              </div>
            </div>
            <div className="flex items-center gap-2">
               <button onClick={() => setDarkMode(!darkMode)} className="p-2.5 text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition-all"><i className={`fa-solid ${darkMode ? 'fa-sun text-amber-400' : 'fa-moon'} text-xl`}></i></button>
               <button onClick={() => auth.signOut()} className="px-5 py-2 text-rose-500 font-black text-[10px] uppercase tracking-widest hover:bg-rose-50 rounded-xl">Sair</button>
            </div>
          </header>

          <div className="flex flex-1 overflow-hidden relative main-h">
            <aside className={`absolute lg:static inset-y-0 left-0 z-40 w-72 bg-white dark:bg-slate-900 border-r dark:border-slate-800 transform transition-transform duration-300 ease-in-out hide-print ${menuOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
              <nav className="p-6 space-y-2">
                {[
                  { id: 'dashboard', icon: <Icons.Box />, label: 'Dashboard' },
                  { id: 'estoque', icon: <Icons.Inventory />, label: 'Estoque' }, // NOVA ABA
                  { id: 'produtos', icon: <i className="fa-solid fa-cubes"></i>, label: 'Materiais' },
                  { id: 'movimentacoes', icon: <i className="fa-solid fa-exchange"></i>, label: 'Lançamentos' },
                  { id: 'rastreio', icon: <Icons.History />, label: 'Histórico' },
                  { id: 'funcionarios', icon: <Icons.Users />, label: 'Membros' },
                  { id: 'empresas', icon: <i className="fa-solid fa-building"></i>, label: 'Empresas' },
                ].map(item => (
                  <button key={item.id} onClick={() => { setActiveTab(item.id); setMenuOpen(false); }}
                    className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl font-bold transition-all ${activeTab === item.id ? 'bg-brand text-white shadow-xl' : 'text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>
                    <span className="w-6 flex justify-center">{item.icon}</span> {item.label}
                  </button>
                ))}
                {userProfile.role === 'admin' && (
                  <button onClick={() => { setActiveTab('admin'); setMenuOpen(false); }} className={`w-full flex items-center gap-4 px-5 py-4 mt-10 rounded-2xl font-bold transition-all ${activeTab === 'admin' ? 'bg-slate-900 text-white dark:bg-white dark:text-slate-900 shadow-xl' : 'text-slate-400'}`}>
                    <span className="w-6 flex justify-center"><Icons.Admin /></span> Administração
                  </button>
                )}
              </nav>
            </aside>

            {menuOpen && <div className="fixed inset-0 bg-black/40 z-30 lg:hidden backdrop-blur-sm" onClick={() => setMenuOpen(false)}></div>}

            <main className="flex-1 overflow-y-auto p-4 sm:p-8">
              {dbLoading ? <div className="h-full flex items-center justify-center"><i className="fa-solid fa-spinner fa-spin text-3xl text-brand"></i></div> : (
                <>
                  {activeTab === 'dashboard' && <TabDashboard />}
                  {activeTab === 'estoque' && <TabEstoque />} {/* NOVA TELA */}
                  {activeTab === 'rastreio' && <TabHistorico />}
                  {activeTab === 'admin' && <TabAdministracao />}
                  
                  {activeTab === 'produtos' && (
                    <div className="max-w-4xl mx-auto animate-fade-in">
                       <h2 className="text-3xl font-black text-slate-800 dark:text-white mb-8 tracking-tight">Catálogo</h2>
                       <div className="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] shadow-sm border dark:border-slate-800 mb-8 space-y-4">
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                             <input id="p_cod" placeholder="ID/Cód" className="bg-slate-50 dark:bg-slate-950 p-4 rounded-2xl outline-none dark:text-white font-bold" />
                             <input id="p_nome" placeholder="Nome do Material" className="bg-slate-50 dark:bg-slate-950 p-4 rounded-2xl outline-none dark:text-white font-bold" />
                             <select id="p_uni" className="bg-slate-50 dark:bg-slate-950 p-4 rounded-2xl outline-none dark:text-white font-bold">
                                <option>Unidade (un)</option><option>Par</option><option>Metro (m)</option><option>kg</option><option>Saco 50kg</option>
                             </select>
                             <input id="p_min" type="number" placeholder="Estoque Mínimo" className="bg-slate-50 dark:bg-slate-950 p-4 rounded-2xl outline-none dark:text-white font-bold" />
                          </div>
                          <button onClick={async () => {
                            const c = document.getElementById('p_cod').value, n = document.getElementById('p_nome').value, u = document.getElementById('p_uni').value, m = document.getElementById('p_min').value;
                            if(!c || !n || !m) return notify('Preencha os campos!', 'error');
                            await db.collection(`artifacts/${APP_ID}/public/data/produtos`).doc(Date.now().toString()).set({codigo:c, nome:n, unidade:u, estoqueMinimo:parseInt(m), quantidadeAtual:0});
                            notify('Material guardado!');
                            document.getElementById('p_cod').value = ''; document.getElementById('p_nome').value = '';
                          }} className="w-full bg-brand text-white font-black py-4 rounded-2xl shadow-xl shadow-brand/20">Guardar Material</button>
                       </div>
                       <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                          {produtos.map(p => (
                            <div key={p.id} className="bg-white dark:bg-slate-900 p-5 rounded-3xl border dark:border-slate-800 flex justify-between items-center transition-all hover:scale-[1.02] shadow-sm">
                              <div><p className="font-bold dark:text-white">{p.nome}</p><p className="text-[10px] uppercase font-black text-slate-400 tracking-widest">Cód: {p.codigo} • {p.unidade}</p></div>
                              <button onClick={() => setModalConfirm({show:true, col:'produtos', id:p.id, msg:'Remover este material?'})} className="text-slate-200 hover:text-rose-500 transition-colors"><i className="fa-solid fa-trash-can"></i></button>
                            </div>
                          ))}
                       </div>
                    </div>
                  )}

                  {activeTab === 'movimentacoes' && (
                    <div className="max-w-4xl mx-auto animate-fade-in">
                       <h2 className="text-3xl font-black text-slate-800 dark:text-white mb-8 tracking-tight">Lançar Movimento</h2>
                       <div className="flex gap-4 mb-8">
                          <button id="btn_saida" onClick={() => { document.getElementById('m_tipo_val').value = 'saida'; document.getElementById('btn_saida').className = "flex-1 p-6 rounded-[2.5rem] border-4 border-rose-500 bg-rose-50 dark:bg-rose-950/20 text-rose-600 font-black text-xl shadow-lg transition-all"; document.getElementById('btn_entrada').className = "flex-1 p-6 rounded-[2.5rem] border-4 border-transparent bg-white dark:bg-slate-900 text-slate-400 font-black text-xl opacity-50 transition-all"; }} className="flex-1 p-6 rounded-[2.5rem] border-4 border-rose-500 bg-rose-50 dark:bg-rose-950/20 text-rose-600 font-black text-xl transition-all">RETIRADA</button>
                          <button id="btn_entrada" onClick={() => { document.getElementById('m_tipo_val').value = 'entrada'; document.getElementById('btn_entrada').className = "flex-1 p-6 rounded-[2.5rem] border-4 border-emerald-500 bg-emerald-50 dark:bg-emerald-950/20 text-emerald-600 font-black text-xl shadow-lg transition-all"; document.getElementById('btn_saida').className = "flex-1 p-6 rounded-[2.5rem] border-4 border-transparent bg-white dark:bg-slate-900 text-slate-400 font-black text-xl opacity-50 transition-all"; }} className="flex-1 p-6 rounded-[2.5rem] border-4 border-transparent bg-white dark:bg-slate-900 text-slate-400 font-black text-xl opacity-50 transition-all">CARGA</button>
                       </div>
                       <input type="hidden" id="m_tipo_val" defaultValue="saida" />
                       <div className="bg-white dark:bg-slate-900 p-8 rounded-[3rem] shadow-sm border dark:border-slate-800 space-y-6">
                          <div className="space-y-1">
                            <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Produto</label>
                            <select id="m_prod" className="w-full bg-slate-50 dark:bg-slate-950 p-5 rounded-2xl dark:text-white outline-none font-bold">
                              <option value="">Selecione o Material</option>
                              {produtos.map(p => <option key={p.id} value={p.id}>{p.nome} (Saldo: {p.quantidadeAtual})</option>)}
                            </select>
                          </div>
                          <div className="grid grid-cols-2 gap-4">
                             <div className="space-y-1">
                               <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Quantidade</label>
                               <input id="m_qtd" type="number" placeholder="0" className="w-full bg-slate-50 dark:bg-slate-950 p-5 rounded-2xl dark:text-white outline-none font-black text-2xl" />
                             </div>
                             <div className="space-y-1">
                               <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Validade do Lote</label>
                               <input id="m_val" type="date" className="w-full bg-slate-50 dark:bg-slate-950 p-5 rounded-2xl dark:text-white outline-none font-bold" />
                             </div>
                          </div>
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                             <div className="space-y-1">
                               <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Responsável</label>
                               <select id="m_func" className="w-full bg-slate-50 dark:bg-slate-950 p-5 rounded-2xl dark:text-white outline-none font-bold">
                                  <option value="">Quem retira/traz?</option>
                                  {funcionarios.map(f => <option key={f.id} value={f.id}>{f.nome} (ID: {f.id})</option>)}
                               </select>
                             </div>
                             <div className="space-y-1">
                               <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Empresa</label>
                               <select id="m_emp" className="w-full bg-slate-50 dark:bg-slate-950 p-5 rounded-2xl dark:text-white outline-none font-bold">
                                  <option value="">Empresa Vinculada</option>
                                  {empresas.map(e => <option key={e.id} value={e.id}>{e.nome}</option>)}
                               </select>
                             </div>
                          </div>
                          <div className="space-y-1">
                            <label className="text-[10px] font-black uppercase text-slate-400 ml-1 tracking-widest">Observações Extras</label>
                            <textarea id="m_obs" rows="3" placeholder="Anote detalhes importantes aqui..." className="w-full bg-slate-50 dark:bg-slate-950 p-5 rounded-2xl dark:text-white outline-none font-medium border-none resize-none"></textarea>
                          </div>
                          <button onClick={async () => {
                             const t = document.getElementById('m_tipo_val').value, pId = document.getElementById('m_prod').value, q = parseInt(document.getElementById('m_qtd').value), f = document.getElementById('m_func').value, eId = document.getElementById('m_emp').value, v = document.getElementById('m_val').value, obs = document.getElementById('m_obs').value;
                             if(!pId || !q || !f) return notify('Preencha os dados obrigatórios!', 'error');
                             const pr = produtos.find(i => i.id === pId);
                             if(t === 'saida' && pr.quantidadeAtual < q) return notify('Saldo insuficiente!', 'error');
                             const nS = t === 'entrada' ? pr.quantidadeAtual + q : pr.quantidadeAtual - q;
                             await db.collection(`artifacts/${APP_ID}/public/data/produtos`).doc(pId).update({quantidadeAtual: nS});
                             const d = new Date();
                             await db.collection(`artifacts/${APP_ID}/public/data/movimentacoes`).doc(Date.now().toString()).set({
                               tipo:t, produtoId:pId, quantidade:q, funcionarioId:f, empresaId:eId, validadeLote:v, observacoes: obs,
                               dataInterna:d.toISOString().split('T')[0], data: d.toLocaleString('pt-PT')
                             });
                             notify('Lançamento realizado!');
                             document.getElementById('m_qtd').value = ''; document.getElementById('m_obs').value = '';
                          }} className="w-full bg-brand text-white font-black py-5 rounded-[2.5rem] shadow-xl shadow-brand/20 transition-all active:scale-[0.98] text-lg uppercase tracking-widest">Efetuar Lançamento</button>
                       </div>
                    </div>
                  )}

                  {activeTab === 'funcionarios' && (
                    <div className="max-w-4xl mx-auto animate-fade-in">
                       <h2 className="text-3xl font-black text-slate-800 dark:text-white mb-8 tracking-tight">Equipa</h2>
                       <div className="bg-white dark:bg-slate-900 p-8 rounded-[3rem] shadow-sm border dark:border-slate-800 mb-8 space-y-4">
                          <input id="f_id" placeholder="ID / Matrícula" className="w-full bg-slate-50 dark:bg-slate-950 p-5 rounded-2xl outline-none dark:text-white font-bold" />
                          <input id="f_nome" placeholder="Nome Completo" className="w-full bg-slate-50 dark:bg-slate-950 p-5 rounded-2xl outline-none dark:text-white font-bold" />
                          <input id="f_func" placeholder="Função / Cargo" className="w-full bg-slate-50 dark:bg-slate-950 p-5 rounded-2xl outline-none dark:text-white font-bold" />
                          <button onClick={async () => {
                             const i = document.getElementById('f_id').value, n = document.getElementById('f_nome').value, f = document.getElementById('f_func').value;
                             if(!i || !n) return notify('Preencha ID e Nome!', 'error');
                             await db.collection(`artifacts/${APP_ID}/public/data/funcionarios`).doc(i).set({id:i, nome:n, funcao:f});
                             notify('Membro cadastrado!');
                             document.getElementById('f_id').value = ''; document.getElementById('f_nome').value = '';
                          }} className="w-full bg-brand text-white font-black py-4 rounded-2xl shadow-lg shadow-brand/20 transition-all active:scale-95">Registar Membro</button>
                       </div>
                       <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          {funcionarios.map(f => (
                            <div key={f.id} className="bg-white dark:bg-slate-900 p-5 rounded-3xl border dark:border-slate-800 flex justify-between items-center shadow-sm">
                              <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-brand/10 rounded-2xl flex items-center justify-center font-black text-brand text-xl">{f.nome[0].toUpperCase()}</div>
                                <div><p className="font-bold dark:text-white">{f.nome}</p><p className="text-[10px] font-black uppercase text-slate-400 tracking-widest">ID: {f.id} • {f.funcao}</p></div>
                              </div>
                              <button onClick={() => setModalConfirm({show:true, col:'funcionarios', id:f.id, msg:'Remover este membro?'})} className="text-slate-200 hover:text-rose-500 transition-colors"><i className="fa-solid fa-user-minus"></i></button>
                            </div>
                          ))}
                       </div>
                    </div>
                  )}

                  {activeTab === 'empresas' && (
                    <div className="max-w-4xl mx-auto animate-fade-in">
                       <h2 className="text-3xl font-black text-slate-800 dark:text-white mb-8 tracking-tight">Empresas</h2>
                       <div className="bg-white dark:bg-slate-900 p-8 rounded-[3rem] shadow-sm border dark:border-slate-800 mb-8 space-y-4">
                          <input id="e_nome" placeholder="Nome / Razão Social" className="w-full bg-slate-50 dark:bg-slate-950 p-5 rounded-2xl outline-none dark:text-white font-bold" />
                          <button onClick={async () => {
                             const n = document.getElementById('e_nome').value;
                             if(!n) return notify('Preencha o nome!', 'error');
                             await db.collection(`artifacts/${APP_ID}/public/data/empresas`).doc(Date.now().toString()).set({nome:n});
                             notify('Empresa salva!');
                             document.getElementById('e_nome').value = '';
                          }} className="w-full bg-brand text-white font-black py-4 rounded-2xl shadow-lg shadow-brand/20 transition-all active:scale-95">Salvar Empresa</button>
                       </div>
                       <div className="space-y-3">
                          {empresas.map(e => (
                            <div key={e.id} className="bg-white dark:bg-slate-900 p-5 rounded-3xl border dark:border-slate-800 flex justify-between items-center shadow-sm">
                               <p className="font-bold dark:text-white flex items-center gap-4"><i className="fa-solid fa-building text-slate-400"></i>{e.nome}</p>
                               <button onClick={() => setModalConfirm({show:true, col:'empresas', id:e.id, msg:'Remover empresa?'})} className="text-slate-200 hover:text-rose-500 transition-colors"><i className="fa-solid fa-trash-can"></i></button>
                            </div>
                          ))}
                       </div>
                    </div>
                  )}
                </>
              )}
            </main>
          </div>

          {modalConfirm.show && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6 animate-fade-in">
              <div className="bg-white dark:bg-slate-900 p-10 rounded-[3rem] shadow-2xl max-w-xs w-full text-center border dark:border-slate-800">
                <i className="fa-solid fa-circle-exclamation text-5xl text-rose-500 mb-6"></i>
                <h3 className="text-xl font-bold dark:text-white mb-8">{modalConfirm.msg}</h3>
                <div className="flex gap-4">
                  <button onClick={() => setModalConfirm({show:false})} className="flex-1 py-3 font-bold text-slate-400 tracking-widest text-[10px] uppercase">Não</button>
                  <button onClick={handleConfirmDelete} className="flex-1 py-3 bg-rose-500 text-white font-black rounded-2xl shadow-lg shadow-rose-500/20 active:scale-95 transition-all">Confirmar</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
  </html>
